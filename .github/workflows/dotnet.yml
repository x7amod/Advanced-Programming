name: build

on:
  push:
    branches: [ '**' ]
    paths:
      - "MVC Frontend/**"
      - "Reporting App/**"
      - "Web API/**"
      - "*.sln"
      - ".github/workflows/dotnet.yml"
  pull_request:
    branches: [ '**' ]
    paths:
      - "MVC Frontend/**"
      - "Reporting App/**"
      - "Web API/**"
      - "*.sln"
      - ".github/workflows/dotnet.yml"

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: |
          **/*.csproj
          **/*.sln
    - name: Restore dependencies
      run: dotnet restore "TrainingInstitute.sln"
    - name: Build
      run: dotnet build "TrainingInstitute.sln" --no-restore
    - name: Test
      run: dotnet test "TrainingInstitute.sln" --no-build --verbosity minimal
