<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F4C41"/>
      <stop offset="55%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="overlayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="40%" stop-color="rgba(0,0,0,0.35)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="520" cy="80"  r="180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <circle cx="520" cy="80"  r="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="-20" cy="720" r="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <circle cx="560" cy="60"  r="90"  fill="rgba(20,184,166,0.22)"/>
  <circle cx="40"  cy="760" r="110" fill="rgba(15,118,110,0.28)"/>

  <!-- Card 1: Active Trainees -->
  <rect x="48" y="80" width="220" height="95" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="78" cy="113" r="17" fill="rgba(255,255,255,0.15)"/>
  <path d="M78 107 l9 4 -9 4 -9 -4 z" fill="none" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M69 111 v5 q0 4 9 4 9 0 9-4 v-5" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <text x="104" y="110" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="500">Active Trainees</text>
  <text x="104" y="131" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ffffff" font-weight="700" letter-spacing="-0.5">1,240</text>
  <text x="104" y="150" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">▲ 12% this quarter</text>

  <!-- Card 2: Certifications -->
  <rect x="290" y="80" width="220" height="95" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="320" cy="113" r="17" fill="rgba(255,255,255,0.15)"/>
  <circle cx="320" cy="110" r="7" fill="none" stroke="#fff" stroke-width="1.4"/>
  <path d="M316 117 l-2 8 6-3 6 3 -2-8" fill="none" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
  <text x="346" y="110" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="500">Certifications</text>
  <text x="346" y="131" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ffffff" font-weight="700" letter-spacing="-0.5">386</text>
  <text x="346" y="150" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">Issued this year</text>

  <!-- Card 3: Sessions -->
  <rect x="48" y="196" width="220" height="95" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="78" cy="229" r="17" fill="rgba(255,255,255,0.15)"/>
  <rect x="69" y="222" width="18" height="14" rx="2" fill="none" stroke="#fff" stroke-width="1.4"/>
  <path d="M69 227 h18" stroke="#fff" stroke-width="1.4"/>
  <path d="M74 220 v4 M82 220 v4" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <text x="104" y="226" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="500">Sessions this month</text>
  <text x="104" y="247" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ffffff" font-weight="700" letter-spacing="-0.5">48</text>
  <text x="104" y="266" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">Across 5 locations</text>

  <!-- Card 4: Courses -->
  <rect x="290" y="196" width="220" height="95" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="320" cy="229" r="17" fill="rgba(255,255,255,0.15)"/>
  <path d="M312 223 h9 a4 4 0 0 1 4 4 v7 a4 4 0 0 1-4 4 h-9 z" fill="none" stroke="#fff" stroke-width="1.4"/>
  <path d="M312 223 v15" stroke="#fff" stroke-width="1.4"/>
  <text x="346" y="226" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="500">Courses available</text>
  <text x="346" y="247" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ffffff" font-weight="700" letter-spacing="-0.5">62</text>
  <text x="346" y="266" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">In 4 subject areas</text>

  <!-- Completion rate card -->
  <rect x="48" y="312" width="462" height="135" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="68" y="338" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff" font-weight="600">Enrollment completion rate</text>

  <text x="68" y="360" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">C# Fundamentals</text>
  <rect x="68" y="364" width="370" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
  <rect x="68" y="364" width="318" height="8" rx="4" fill="rgba(255,255,255,0.75)"/>
  <text x="448" y="372" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-weight="600">86%</text>

  <text x="68" y="391" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Cybersecurity Foundations</text>
  <rect x="68" y="395" width="370" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
  <rect x="68" y="395" width="278" height="8" rx="4" fill="rgba(255,255,255,0.75)"/>
  <text x="448" y="403" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-weight="600">75%</text>

  <text x="68" y="422" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Project Management Basics</text>
  <rect x="68" y="426" width="370" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
  <rect x="68" y="426" width="340" height="8" rx="4" fill="rgba(255,255,255,0.75)"/>
  <text x="448" y="434" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-weight="600">92%</text>

  <!-- Dark gradient overlay for bottom tagline — starts well below the last card -->
  <rect x="0" y="470" width="600" height="330" fill="url(#overlayGrad)"/>
</svg>
