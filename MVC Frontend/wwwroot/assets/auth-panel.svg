<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F4C41"/>
      <stop offset="55%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="520" cy="80"  r="180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <circle cx="520" cy="80"  r="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="-20" cy="720" r="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <circle cx="560" cy="60"  r="90"  fill="rgba(20,184,166,0.22)"/>
  <circle cx="40"  cy="760" r="110" fill="rgba(15,118,110,0.28)"/>

  <!-- Card 1: Active Trainees -->
  <rect x="48" y="160" width="220" height="100" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="78" cy="195" r="18" fill="rgba(255,255,255,0.15)"/>
  <path d="M78 188 l10 5 -10 5 -10 -5 z" fill="none" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M68 193 v6 q0 4 10 4 10 0 10-4 v-6" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <text x="104" y="192" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="500">Active Trainees</text>
  <text x="104" y="213" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#ffffff" font-weight="700" letter-spacing="-0.5">1,240</text>
  <text x="104" y="233" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">▲ 12% this quarter</text>

  <!-- Card 2: Certifications -->
  <rect x="290" y="160" width="220" height="100" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="320" cy="195" r="18" fill="rgba(255,255,255,0.15)"/>
  <circle cx="320" cy="192" r="7" fill="none" stroke="#fff" stroke-width="1.4"/>
  <path d="M316 199 l-2 8 6-3 6 3 -2-8" fill="none" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
  <text x="346" y="192" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="500">Certifications</text>
  <text x="346" y="213" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#ffffff" font-weight="700" letter-spacing="-0.5">386</text>
  <text x="346" y="233" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">Issued this year</text>

  <!-- Card 3: Sessions -->
  <rect x="48" y="284" width="220" height="100" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="78" cy="319" r="18" fill="rgba(255,255,255,0.15)"/>
  <rect x="69" y="312" width="18" height="15" rx="3" fill="none" stroke="#fff" stroke-width="1.4"/>
  <path d="M69 317 h18" stroke="#fff" stroke-width="1.4"/>
  <path d="M74 310 v4 M82 310 v4" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <text x="104" y="316" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="500">Sessions this month</text>
  <text x="104" y="337" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#ffffff" font-weight="700" letter-spacing="-0.5">48</text>
  <text x="104" y="357" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">Across 5 locations</text>

  <!-- Card 4: Courses -->
  <rect x="290" y="284" width="220" height="100" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="320" cy="319" r="18" fill="rgba(255,255,255,0.15)"/>
  <path d="M312 312 h10 a4 4 0 0 1 4 4 v9 a4 4 0 0 1-4 4 h-10 z" fill="none" stroke="#fff" stroke-width="1.4"/>
  <path d="M312 312 v17" stroke="#fff" stroke-width="1.4"/>
  <text x="346" y="316" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" font-weight="500">Courses available</text>
  <text x="346" y="337" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#ffffff" font-weight="700" letter-spacing="-0.5">62</text>
  <text x="346" y="357" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">In 4 subject areas</text>

  <!-- Completion rate card -->
  <rect x="48" y="420" width="462" height="140" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="68" y="448" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff" font-weight="600">Enrollment completion rate</text>

  <text x="68" y="472" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">C# Fundamentals</text>
  <rect x="68" y="477" width="370" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
  <rect x="68" y="477" width="318" height="8" rx="4" fill="rgba(255,255,255,0.75)"/>
  <text x="448" y="485" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-weight="600">86%</text>

  <text x="68" y="504" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Cybersecurity Foundations</text>
  <rect x="68" y="509" width="370" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
  <rect x="68" y="509" width="278" height="8" rx="4" fill="rgba(255,255,255,0.75)"/>
  <text x="448" y="517" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-weight="600">75%</text>

  <text x="68" y="536" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Project Management Basics</text>
  <rect x="68" y="541" width="370" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
  <rect x="68" y="541" width="340" height="8" rx="4" fill="rgba(255,255,255,0.75)"/>
  <text x="448" y="549" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" font-weight="600">92%</text>

  <!-- Dark overlay for bottom tagline -->
  <rect x="0" y="650" width="600" height="150" fill="rgba(0,0,0,0.20)"/>
</svg>
