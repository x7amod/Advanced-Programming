<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--tl-bg); }
  .row { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .label { width: 50px; font: var(--tl-micro); color: var(--tl-text-2); font-variant-numeric: tabular-nums; }
  .bar { height: 12px; background: var(--tl-primary); border-radius: 2px; }
  .px { font: var(--tl-micro); color: var(--tl-text-3); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row"><span class="label">s-1</span><div class="bar" style="width:4px;"></div><span class="px">4</span></div>
  <div class="row"><span class="label">s-2</span><div class="bar" style="width:8px;"></div><span class="px">8</span></div>
  <div class="row"><span class="label">s-3</span><div class="bar" style="width:12px;"></div><span class="px">12</span></div>
  <div class="row"><span class="label">s-4</span><div class="bar" style="width:16px;"></div><span class="px">16</span></div>
  <div class="row"><span class="label">s-5</span><div class="bar" style="width:20px;"></div><span class="px">20</span></div>
  <div class="row"><span class="label">s-6</span><div class="bar" style="width:24px;"></div><span class="px">24</span></div>
  <div class="row"><span class="label">s-7</span><div class="bar" style="width:32px;"></div><span class="px">32</span></div>
  <div class="row"><span class="label">s-8</span><div class="bar" style="width:40px;"></div><span class="px">40</span></div>
  <div class="row"><span class="label">s-9</span><div class="bar" style="width:48px;"></div><span class="px">48</span></div>
  <div class="row"><span class="label">s-10</span><div class="bar" style="width:64px;"></div><span class="px">64</span></div>
</body>
</html>
