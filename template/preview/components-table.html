<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components · Data table</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 16px; background: var(--tl-bg); }
  .card { background: var(--tl-surface); border: 1px solid var(--tl-border); border-radius: var(--tl-r-md); overflow: hidden; box-shadow: var(--tl-shadow-xs); }
  table { width: 100%; border-collapse: collapse; font: var(--tl-body); }
  th { text-align: left; padding: 10px 16px; background: var(--tl-surface-2); font: var(--tl-micro); text-transform: uppercase; letter-spacing: 0.04em; color: var(--tl-text-2); border-bottom: 1px solid var(--tl-border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--tl-divider); color: var(--tl-text-1); }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: var(--tl-bg); }
  .num { font-variant-numeric: tabular-nums; }
  .b { display: inline-flex; padding: 2px 8px; border-radius: var(--tl-r-pill); font: var(--tl-micro); font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <table>
      <thead><tr><th>Course</th><th>Date</th><th>Status</th><th class="num">Fee</th></tr></thead>
      <tbody>
        <tr><td>Project Management Fundamentals</td><td class="num">12 May 2026</td><td><span class="b" style="background:#D1FAE5;color:#065F46;">Enrolled</span></td><td class="num">BHD 120.000</td></tr>
        <tr><td>Occupational Safety, Level 2</td><td class="num">20 May 2026</td><td><span class="b" style="background:#FEF3C7;color:#92400E;">Pending</span></td><td class="num">BHD 85.000</td></tr>
        <tr><td>ITIL Foundation</td><td class="num">04 Jun 2026</td><td><span class="b" style="background:#DBEAFE;color:#1E40AF;">Completed</span></td><td class="num">BHD 240.000</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
