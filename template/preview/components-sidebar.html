<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components · Sidebar nav</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 16px; background: var(--tl-bg); }
  .sb { width: 240px; background: var(--tl-surface); border: 1px solid var(--tl-border); border-radius: var(--tl-r-md); padding: 14px 10px; box-shadow: var(--tl-shadow-xs); }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 14px; border-bottom: 1px solid var(--tl-divider); margin-bottom: 10px; }
  .brand img { height: 24px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--tl-r-sm); font: var(--tl-body-strong); color: var(--tl-text-2); cursor: pointer; }
  .item.active { background: var(--tl-primary-tint); color: var(--tl-primary); }
  .item:not(.active):hover { background: var(--tl-surface-2); color: var(--tl-text-1); }
  .ic { width: 18px; height: 18px; flex: none; }
  .group { font: var(--tl-eyebrow); text-transform: uppercase; letter-spacing: 0.06em; color: var(--tl-text-3); padding: 12px 10px 4px; }
</style>
</head>
<body>
  <div class="sb">
    <div class="brand"><img src="../assets/logo.svg" alt=""/></div>
    <div class="item active"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 4l9 8"/><path d="M5 10v9h14v-9"/></svg>Dashboard</div>
    <div class="item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h12a3 3 0 0 1 3 3v11H7a3 3 0 0 1-3-3z"/><path d="M4 5v11"/></svg>Browse courses</div>
    <div class="item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>My enrollments</div>
    <div class="item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="5"/><path d="M9 14l-2 7 5-3 5 3-2-7"/></svg>My certifications</div>
    <div class="item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>My payments</div>
  </div>
</body>
</html>
